name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: MinhKhoixyz
          outputs: |
            # Bản này sẽ có con rắn màu xanh dương và các chấm đóng góp cùng tông
            dist/github-contribution-grid-snake.svg?color_snake=#36BCF7&color_dots=#161b22,#213147,#294e77,#36BCF7,#82d5f9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
